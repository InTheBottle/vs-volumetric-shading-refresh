    float cloudDensity = clamp(col.a, 0.0, 1.0);
    float cloudPowder = 1.0 - exp(-4.0 * cloudDensity);
    float cloudSun = pow(clamp(dot(normalize(vertexPos + vec3(0.0, 100.0, 0.0)), normalize(sunPosition)) * 0.5 + 0.5, 0.0, 1.0), 3.0);
