- type: regex
  filename: final.fsh
  regex: '#\s*if\s+GODRAYS\s*>\s*0[^#]*'
  snippet: volumetricfinal.txt

- type: token
  filename: final.fsh
  tokens: "#include noise3d.ash"
  content: |
    #include noise3d.ash

    float vsmodFinalDither(vec2 p) {
        vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));
        p3 += dot(p3, p3.yzx + 33.33);
        return fract((p3.x + p3.y) * p3.z);
    }

    float vsmodFinalTriangularDither(vec2 p) {
        return vsmodFinalDither(p) + vsmodFinalDither(p + 17.0) - 1.0;
    }

- type: regex
  filename: final.fsh
  regex: 'outColor\.a\s*=\s*1\s*;\s*\}'
  content: |
    outColor.rgb = clamp(outColor.rgb + vsmodFinalTriangularDither(gl_FragCoord.xy + windWaveCounter) * (1.0 / 255.0), 0.0, 1.0);
    outColor.a=1;
    }

- type: token
  filename: sky.fsh
  tokens: outGlow.y *= clamp((dayLight - 0.05) * 2 - 50*murkiness, 0, 1);
  content: |
    #if GODRAYS > 0
    float normalOut = 0.5f*dayLight;
    float intensity = dot(normalize(shadowCoordsFar.xyz-shadowRayStart.xyz), normalize(shadowLightPos.xyz-shadowRayStart.xyz));
    float phase = vsmodVolumetricPhase(intensity) + 0.75;
    outGlow.y = pow(phase * normalOut, VOLUMETRIC_FLATNESS);
    #endif

